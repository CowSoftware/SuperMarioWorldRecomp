# Docs - https://docs.github.com/en/communities/using-templates-to-encourage-useful-issues-and-pull-requests/syntax-for-githubs-form-schema
name: Feature request
description: Suggest a new feature for the launcher
labels: ["Enhancement / Feature Request"]

body:
  - type: textarea
    id: desc
    attributes:
      label: Description
      description: |
        What feature/enhancement do you want?
    validations:
      required: true
  - type: textarea
    id: behavior
    attributes:
      label: Behavior
      description: |
        How is this feature/enhancement going to work or behave?
    validations:
      required: true
  - type: textarea
    id: examples
    attributes:
      label: Examples
      description: |
        Provide some examples and if possible, videos or screenshots to show how your wanted feature exactly works.
    validations:
      required: false